{% load static %}

<section class="menu-lateral">
    <nav class="menu-lateral__navegacao">
        {% for item in menu_items %}

        <a href="{% if not item.disabled %}{% url item.url_name %}{% else %}#{% endif %}">

            <img src="{% static '/assets/ícones/1x/' %}{{ item.icon }} {% if request.resolver_match.url_name == item.url_name %}- ativo{% else %}- inativo{% endif %}.png">

            {{ item.label }}

        </a>

    {% endfor %}
    </nav>
</section>
