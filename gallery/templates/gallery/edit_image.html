{% extends 'base.html' %}

{% load static %}

{% block content %}

<section class="galeria" style="margin-left: 5em">
    <form action="{% url 'edit_image' photo_id %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="row">
            {% for field in form.visible_fields %}
                 <div class="col-12 col-lg-12" style="margin-bottom: 10px;">
                    <label for="{{ field.name }}" style="color:#D9D9D9; margin-bottom: 5px;"><b>{{ field.label }}</b></label>
                    {{ field }}
                </div>
            {% endfor %}
            
            {% include 'partials/_messages.html' %}
            
            <div class="col-4 text-center">
                <button class="btn btn-success col-12" style="padding: top 5px;" type="submit">Adicionar</button>
            </div>
        </div>
    </form>
</section>  
{% endblock %}
